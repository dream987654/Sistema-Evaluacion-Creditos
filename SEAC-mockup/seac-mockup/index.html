<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEAC · Ingresar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo">SE</div>
      <h2>SEAC</h2>
      <p class="sub">Cooperativa Ética &middot; Sistema de Evaluación y Aprobación de Créditos</p>

      <div class="field">
        <label>Nombre</label>
        <input type="text" placeholder="Ana Torres" value="Ana Torres" />
      </div>
      <div class="field">
        <label>Rol</label>
        <select>
          <option>Asesor financiero</option>
          <option selected>Evaluador</option>
          <option>Supervisor financiero</option>
          <option>Administrador del sistema</option>
          <option>Gerencia</option>
        </select>
      </div>

      <a href="dashboard.html" class="btn primary">Ingresar</a>
      <p class="hint">Acceso simulado por rol &mdash; solo para fines de presentación</p>
    </div>
  </div>
</body>
</html>
